# Middleware de redirection HTTP -> HTTPS (Traefik)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: serverhub
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# App servie en HTTPS sur le domaine (TLS Let's Encrypt via cert-manager)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: serverhub
  namespace: serverhub
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/service.passhostheader: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - serverhub.georgeop.us
      secretName: serverhub-tls
  rules:
    - host: serverhub.georgeop.us
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: serverhub-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: serverhub-web
                port:
                  number: 3000
---
# Redirection HTTP -> HTTPS pour le domaine
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: serverhub-redirect
  namespace: serverhub
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: serverhub-redirect-to-https@kubernetescrd
spec:
  rules:
    - host: serverhub.georgeop.us
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: serverhub-web
                port:
                  number: 3000
---
# Accès direct par IP en HTTP (secours, sans redirection)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: serverhub-ip
  namespace: serverhub
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/service.passhostheader: "true"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: serverhub-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: serverhub-web
                port:
                  number: 3000
