apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: serverhub
  namespace: serverhub
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/service.passhostheader: "true"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: serverhub-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: serverhub-web
                port:
                  number: 3000
