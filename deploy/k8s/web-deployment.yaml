apiVersion: apps/v1
kind: Deployment
metadata:
  name: serverhub-web
  namespace: serverhub
  labels:
    app: serverhub-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serverhub-web
  template:
    metadata:
      labels:
        app: serverhub-web
    spec:
      containers:
        - name: web
          image: serverhub-web:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
