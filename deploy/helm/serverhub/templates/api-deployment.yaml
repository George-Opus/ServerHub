apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "serverhub.api.fullname" . }}
  labels:
    {{- include "serverhub.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "serverhub.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "serverhub.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "serverhub.secretName" . }}
                  key: SECRET_KEY
            - name: FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "serverhub.secretName" . }}
                  key: FERNET_KEY
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "serverhub.configName" . }}
                  key: CORS_ORIGINS
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "serverhub.configName" . }}
                  key: DATABASE_URL
            - name: ALLOW_REGISTRATION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "serverhub.configName" . }}
                  key: ALLOW_REGISTRATION
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "serverhub.api.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
