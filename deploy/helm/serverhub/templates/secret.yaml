{{- $existing := (lookup "v1" "Secret" .Release.Namespace (include "serverhub.secretName" .)) -}}
{{- $secretKey := "" -}}
{{- if .Values.secrets.secretKey -}}
{{-   $secretKey = .Values.secrets.secretKey | b64enc -}}
{{- else if and $existing (hasKey $existing.data "SECRET_KEY") -}}
{{-   $secretKey = index $existing.data "SECRET_KEY" -}}
{{- else -}}
{{-   $secretKey = randAlphaNum 48 | b64enc -}}
{{- end -}}
{{- $fernetKey := "" -}}
{{- if .Values.secrets.fernetKey -}}
{{-   $fernetKey = .Values.secrets.fernetKey | b64enc -}}
{{- else if and $existing (hasKey $existing.data "FERNET_KEY") -}}
{{-   $fernetKey = index $existing.data "FERNET_KEY" -}}
{{- else -}}
{{-   $fernetKey = randAlphaNum 32 | b64enc | replace "+" "-" | replace "/" "_" | b64enc -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "serverhub.secretName" . }}
  labels:
    {{- include "serverhub.labels" . | nindent 4 }}
type: Opaque
data:
  SECRET_KEY: {{ $secretKey | quote }}
  FERNET_KEY: {{ $fernetKey | quote }}
